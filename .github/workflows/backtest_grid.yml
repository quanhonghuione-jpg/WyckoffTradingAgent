name: Backtest Grid

on:
  schedule:
    # 每月 1 号和 15 号 UTC 20:00（北京时间次日 04:00）自动回测
    - cron: "0 20 1,15 * *"
  workflow_dispatch:
    inputs:
      period:
        description: "回测时期（优先；选 custom 时用 start/end）"
        required: true
        type: choice
        options:
          - "all_defined"
          - "recent_6m"
          - "bull_2020"
          - "bear_2022"
          - "custom"
        default: "all_defined"
      start:
        description: "自定义起始日期 (YYYY-MM-DD)，仅 period=custom 时生效"
        required: false
        default: ""
      end:
        description: "自定义结束日期 (YYYY-MM-DD)，仅 period=custom 时生效"
        required: false
        default: ""

concurrency:
  group: backtest-grid-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  BT_START: ${{ inputs.start }}
  BT_END: ${{ inputs.end }}
  BT_TOP_N: "4"
  BT_BOARD: "main_chinext"
  BT_SAMPLE_SIZE: "0"
  BT_TRADING_DAYS: "320"
  BT_ENTRY_PRICE_MODE: "open"
  BT_INITIAL_CASH: "100000"
  BT_MAX_POSITIONS: "4"
  BT_PORTFOLIO_STYLES: "all_core"
  BT_COMMISSION_RATE: "0.0002"
  BT_SMALL_TRADE_THRESHOLD: "10000"
  BT_SMALL_TRADE_FEE: "5"

jobs:
  # ────────────────────────────────────────────────
  # Phase 1: 单 job 拉取全量数据，导出快照 artifact
  # 解决 tushare IP 限制（最多2个）和频率限制（500次/分钟）
  # ────────────────────────────────────────────────
  fetch:
    name: Fetch snapshot (${{ matrix.period_key }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        period_key: [recent_6m, bull_2020, bear_2022]
    env:
      PYTHONUNBUFFERED: "1"
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      TICKFLOW_BASE_URL: ${{ secrets.TICKFLOW_BASE_URL }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TZ: Asia/Shanghai
      BACKTEST_SNAPSHOT_WORKERS: "6"
    steps:
      - name: Resolve period dates
        id: period
        run: |
          INPUT_PERIOD="${{ inputs.period || 'recent_6m' }}"
          MATRIX_PERIOD="${{ matrix.period_key }}"
          ACTIVE="false"
          if [ "$INPUT_PERIOD" = "all_defined" ] || [ "$INPUT_PERIOD" = "$MATRIX_PERIOD" ]; then
            ACTIVE="true"
          elif [ "$INPUT_PERIOD" = "custom" ] && [ "$MATRIX_PERIOD" = "recent_6m" ]; then
            ACTIVE="true"
          fi
          echo "BT_PERIOD_ACTIVE=${ACTIVE}" >> "$GITHUB_ENV"
          echo "active=${ACTIVE}" >> "$GITHUB_OUTPUT"
          if [ "$ACTIVE" != "true" ]; then
            echo "BT_PERIOD_KEY=${MATRIX_PERIOD}" >> "$GITHUB_ENV"
            echo "period_key=${MATRIX_PERIOD}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$INPUT_PERIOD" = "custom" ]; then
            PERIOD="custom"
          else
            PERIOD="$MATRIX_PERIOD"
          fi
          echo "BT_PERIOD_KEY=${PERIOD}" >> "$GITHUB_ENV"
          echo "period_key=${PERIOD}" >> "$GITHUB_OUTPUT"
          if [ "$PERIOD" = "bull_2020" ]; then
            echo "BT_START=2020-07-01" >> "$GITHUB_ENV"
            echo "BT_END=2021-02-18" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bear_2022" ]; then
            echo "BT_START=2021-12-13" >> "$GITHUB_ENV"
            echo "BT_END=2022-10-31" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "custom" ]; then
            if [ -z "$BT_END" ]; then
              echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
            if [ -z "$BT_START" ]; then
              echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
          else
            # recent_6m (default)
            echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: steps.period.outputs.active == 'true'

      - name: Set up Python
        if: steps.period.outputs.active == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.period.outputs.active == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch data snapshot
        if: steps.period.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -u scripts/backtest_snapshot_fetch.py \
            --start "$BT_START" \
            --end "$BT_END" \
            --board "$BT_BOARD" \
            --sample-size "$BT_SAMPLE_SIZE" \
            --trading-days "$BT_TRADING_DAYS" \
            --output-dir snapshot_data

      - name: Upload snapshot
        if: steps.period.outputs.active == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backtest-snapshot-${{ steps.period.outputs.period_key }}
          path: snapshot_data/*
          retention-days: 3

  # ────────────────────────────────────────────────
  # Phase 2: 12 个并行 job 读快照做回测（无需网络拉取）
  # 维度: hold_days × stop_loss；每个 job 内部循环 TP=0/18（生产对齐默认关闭 trailing）
  # ────────────────────────────────────────────────
  grid:
    name: Grid ${{ matrix.period_key }} h${{ matrix.hold_days }} sl${{ matrix.stop_loss }}
    runs-on: ubuntu-latest
    needs: fetch
    strategy:
      fail-fast: false
      max-parallel: 24
      matrix:
        period_key: [recent_6m, bull_2020, bear_2022]
        hold_days: [10, 15]
        stop_loss: [-7, -8]
        trailing_stop: [0]
    env:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      TICKFLOW_BASE_URL: ${{ secrets.TICKFLOW_BASE_URL }}
      FUNNEL_AI_SELECTION_MODE: "tradeable_l4"
      FUNNEL_AI_TOTAL_CAP: "8"
      FUNNEL_AI_RISK_ON_TREND: "3"
      FUNNEL_AI_RISK_ON_ACCUM: "5"
      FUNNEL_AI_BEAR_REBOUND_TREND: "1"
      FUNNEL_AI_BEAR_REBOUND_ACCUM: "2"
      FUNNEL_AI_RISK_OFF_TREND: "0"
      FUNNEL_AI_RISK_OFF_ACCUM: "0"
      FUNNEL_AI_NEUTRAL_TREND: "2"
      FUNNEL_AI_NEUTRAL_ACCUM: "3"

    steps:
      - name: Resolve period dates
        id: period
        run: |
          INPUT_PERIOD="${{ inputs.period || 'recent_6m' }}"
          MATRIX_PERIOD="${{ matrix.period_key }}"
          ACTIVE="false"
          if [ "$INPUT_PERIOD" = "all_defined" ] || [ "$INPUT_PERIOD" = "$MATRIX_PERIOD" ]; then
            ACTIVE="true"
          elif [ "$INPUT_PERIOD" = "custom" ] && [ "$MATRIX_PERIOD" = "recent_6m" ]; then
            ACTIVE="true"
          fi
          echo "BT_PERIOD_ACTIVE=${ACTIVE}" >> "$GITHUB_ENV"
          echo "active=${ACTIVE}" >> "$GITHUB_OUTPUT"
          if [ "$ACTIVE" != "true" ]; then
            echo "BT_PERIOD_KEY=${MATRIX_PERIOD}" >> "$GITHUB_ENV"
            echo "period_key=${MATRIX_PERIOD}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$INPUT_PERIOD" = "custom" ]; then
            PERIOD="custom"
          else
            PERIOD="$MATRIX_PERIOD"
          fi
          echo "BT_PERIOD_KEY=${PERIOD}" >> "$GITHUB_ENV"
          echo "period_key=${PERIOD}" >> "$GITHUB_OUTPUT"
          if [ "$PERIOD" = "bull_2020" ]; then
            echo "BT_START=2020-07-01" >> "$GITHUB_ENV"
            echo "BT_END=2021-02-18" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bear_2022" ]; then
            echo "BT_START=2021-12-13" >> "$GITHUB_ENV"
            echo "BT_END=2022-10-31" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "custom" ]; then
            if [ -z "$BT_END" ]; then
              echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
            if [ -z "$BT_START" ]; then
              echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
          else
            echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: steps.period.outputs.active == 'true'

      - name: Set up Python
        if: steps.period.outputs.active == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.period.outputs.active == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[wbt]"

      - name: Download snapshot
        if: steps.period.outputs.active == 'true'
        uses: actions/download-artifact@v4
        with:
          name: backtest-snapshot-${{ steps.period.outputs.period_key }}
          path: snapshot_data/

      - name: Run grid backtest cell
        if: steps.period.outputs.active == 'true'
        shell: bash
        run: |
          set -euo pipefail
          HOLD="${{ matrix.hold_days }}"
          STOP="${{ matrix.stop_loss }}"
          TRAIL="${{ matrix.trailing_stop }}"
          STOP_TAG="${STOP#-}"
          TRAIL_TAG="${TRAIL#-}"
          OUT_ROOT="analysis/backtest_grid_actions/${BT_PERIOD_KEY}/h${HOLD}_sl${STOP_TAG}_tr${TRAIL_TAG}"
          echo "OUT_ROOT=${OUT_ROOT}" >> "${GITHUB_ENV}"
          mkdir -p "${OUT_ROOT}"

          for TP in 0 18; do
            OUT_DIR="${OUT_ROOT}/backtest-grid-${BT_PERIOD_KEY}-h${HOLD}-sl${STOP_TAG}-tp${TP}-tr${TRAIL_TAG}"
            mkdir -p "${OUT_DIR}"
            echo "[grid] period=${BT_PERIOD_KEY} hold=${HOLD} stop=${STOP} tp=${TP} trail=${TRAIL}"
            python -u -m scripts.backtest_runner \
              --start "${BT_START}" \
              --end "${BT_END}" \
              --hold-days "${HOLD}" \
              --top-n "${BT_TOP_N}" \
              --board "${BT_BOARD}" \
              --sample-size "${BT_SAMPLE_SIZE}" \
              --trading-days "${BT_TRADING_DAYS}" \
              --use-current-meta \
              --regime-filter \
              --abc-filter \
              --entry-price-mode "${BT_ENTRY_PRICE_MODE}" \
              --cash-portfolio \
              --initial-cash "${BT_INITIAL_CASH}" \
              --max-positions "${BT_MAX_POSITIONS}" \
              --portfolio-styles "${BT_PORTFOLIO_STYLES}" \
              --commission-rate "${BT_COMMISSION_RATE}" \
              --small-trade-threshold "${BT_SMALL_TRADE_THRESHOLD}" \
              --small-trade-fee "${BT_SMALL_TRADE_FEE}" \
              --exit-mode sltp \
              --stop-loss "${STOP}" \
              --take-profit "${TP}" \
              --sltp-priority stop_first \
              --pending-mode both \
              --pending-merge-order funnel_first \
              --trailing-stop "${TRAIL}" \
              --metrics-engine auto \
              --wbt-n-jobs 2 \
              --snapshot-dir snapshot_data \
              --output-dir "${OUT_DIR}" \
              | tee "${OUT_DIR}/run.log"
          done

      - name: Upload artifacts
        if: always() && steps.period.outputs.active == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backtest-grid-${{ steps.period.outputs.period_key }}-h${{ matrix.hold_days }}-sl${{ matrix.stop_loss }}-tr${{ matrix.trailing_stop }}-${{ github.run_number }}
          path: ${{ env.OUT_ROOT }}/**
          retention-days: 7
          if-no-files-found: warn

  # ────────────────────────────────────────────────
  # Phase 3: 汇总 + 飞书通知
  # ────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: grid
    if: always()
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - name: Resolve period dates
        run: |
          PERIOD="${{ inputs.period || 'recent_6m' }}"
          if [ "$PERIOD" = "all_defined" ]; then
            echo "BT_PERIOD_LABEL=recent_6m,bull_2020,bear_2022" >> "$GITHUB_ENV"
            echo "BT_START=multi" >> "$GITHUB_ENV"
            echo "BT_END=multi" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bull_2020" ]; then
            echo "BT_PERIOD_LABEL=bull_2020" >> "$GITHUB_ENV"
            echo "BT_START=2020-07-01" >> "$GITHUB_ENV"
            echo "BT_END=2021-02-18" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "bear_2022" ]; then
            echo "BT_PERIOD_LABEL=bear_2022" >> "$GITHUB_ENV"
            echo "BT_START=2021-12-13" >> "$GITHUB_ENV"
            echo "BT_END=2022-10-31" >> "$GITHUB_ENV"
          elif [ "$PERIOD" = "custom" ]; then
            echo "BT_PERIOD_LABEL=custom" >> "$GITHUB_ENV"
            if [ -z "$BT_END" ]; then
              echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
            if [ -z "$BT_START" ]; then
              echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            fi
          else
            echo "BT_PERIOD_LABEL=recent_6m" >> "$GITHUB_ENV"
            echo "BT_END=$(TZ=Asia/Shanghai date -d '-1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
            echo "BT_START=$(TZ=Asia/Shanghai date -d '-6 months -1 day' +%Y-%m-%d)" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: backtest-grid-*

      - name: Install dependencies
        run: pip install requests

      - name: Update market backtest report
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/update_backtest_market_report.py \
            --artifacts-dir artifacts \
            --output docs/BACKTEST_MARKET_REPORT.md \
            --run-url "$RUN_URL" \
            --generated-at "$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S Asia/Shanghai')"

      - name: Upload market backtest report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-market-report-${{ github.run_number }}
          path: docs/BACKTEST_MARKET_REPORT.md
          retention-days: 30
          if-no-files-found: error

      - name: Aggregate and notify
        shell: bash
        env:
          BT_TOP_N: "4"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -u - <<'PYEOF'
          import os, glob, json, re, requests

          webhook = os.environ.get('FEISHU_WEBHOOK_URL', '').strip()
          if not webhook:
              print('FEISHU_WEBHOOK_URL 未配置，跳过通知')
              exit(0)

          # 诊断：打印 artifacts 目录结构
          print('[notify] artifacts 目录结构:')
          for root, dirs, files in os.walk('artifacts'):
              for f in files:
                  print(f'  {os.path.join(root, f)}')
          if not os.path.isdir('artifacts'):
              print('[notify] ⚠️ artifacts 目录不存在!')

          summaries = sorted(glob.glob('artifacts/**/summary_*.md', recursive=True))
          print(f'[notify] 找到 {len(summaries)} 个 summary 文件: {summaries[:5]}')

          # --- 单个 summary 用 send_backtest_card ---
          if len(summaries) == 1:
              from utils.feishu import send_backtest_card
              ok = send_backtest_card(webhook, summaries[0])
              print(f'send_backtest_card: {ok}')
              exit(0)

          # --- 多单元 grid：紧凑视觉卡片 ---
          def extract(content, keyword):
              for line in content.split('\n'):
                  if keyword in line:
                      val = line.split(':')[-1].strip().rstrip('%')
                      try: return float(val)
                      except ValueError: return None
              return None

          def extract_exact(content, label):
              prefix = f'- {label}:'
              for line in content.split('\n'):
                  if line.strip().startswith(prefix):
                      val = line.split(':', 1)[-1].strip().rstrip('%')
                      try: return float(val)
                      except ValueError: return None
              return None

          def extract_text(content, label):
              prefix = f'- {label}:'
              for line in content.split('\n'):
                  if line.strip().startswith(prefix):
                      return line.split(':', 1)[-1].strip()
              return ''

          def parse_range(content):
              raw = extract_text(content, '区间')
              parts = [p.strip() for p in raw.split('~', 1)]
              return parts if len(parts) == 2 else ['', '']

          def parse_period(dirname, start, end):
              m = re.search(r'backtest-grid-(recent_6m|bull_2020|bear_2022|custom)-h', dirname)
              if m:
                  return m.group(1)
              if start == '2020-07-01' and end == '2021-02-18':
                  return 'bull_2020'
              if start == '2021-12-13' and end == '2022-10-31':
                  return 'bear_2022'
              return os.environ.get('BT_PERIOD_LABEL', 'recent_6m')

          def parse_num(raw):
              text = str(raw or '').strip().replace(',', '').replace('%', '')
              m = re.search(r'[-+]?\d+(?:\.\d+)?', text)
              if not m:
                  return None
              try:
                  return float(m.group(0))
              except ValueError:
                  return None

          def split_md_row(line):
              return [part.strip() for part in line.strip().strip('|').split('|')]

          def parse_style_rows(content):
              lines = content.splitlines()
              for idx, line in enumerate(lines):
                  cells = split_md_row(line) if line.strip().startswith('|') else []
                  if cells[:2] != ['风格ID', '风格']:
                      continue
                  headers = cells
                  rows = []
                  for raw in lines[idx + 2:]:
                      if not raw.strip().startswith('|'):
                          break
                      values = split_md_row(raw)
                      if len(values) != len(headers):
                          break
                      rows.append(dict(zip(headers, values)))
                  return rows
              return []

          period_names = {
              'recent_6m': '最近6月',
              'bull_2020': '牛市',
              'bear_2022': '熊市',
              'custom': '自定义',
          }
          period_order = {'recent_6m': 0, 'bull_2020': 1, 'bear_2022': 2, 'custom': 3}
          style_names = {
              'slot_equal_4': '等额四仓',
              'probe_add': '观察补仓',
              'confirmation_only': '二次确认',
              'trend_pyramid': '趋势金字塔',
              'concentrated_swap': '集中换股',
          }
          style_order = {'slot_equal_4': 0, 'probe_add': 1, 'confirmation_only': 2, 'trend_pyramid': 3, 'concentrated_swap': 4}

          def period_label(period):
              return period_names.get(period, period)

          def period_sort_key(period):
              return (period_order.get(period, 99), period)

          def style_label(style, fallback=''):
              return fallback or style_names.get(style, style)

          def style_sort_key(style):
              return (style_order.get(style, 99), style)

          cells = []
          for sf in summaries:
              dirname = os.path.basename(os.path.dirname(sf))
              m_hold = re.search(r'h(\d+)', dirname)
              m_sl = re.search(r'sl-?(\d+)', dirname)
              m_tp = re.search(r'tp(\d+)', dirname)
              m_tr = re.search(r'tr-?(\d+)', dirname)
              if not m_hold or not m_sl:
                  continue
              with open(sf, 'r') as f:
                  content = f.read()
              start, end = parse_range(content)
              base_cell = {
                  'period': parse_period(dirname, start, end),
                  'start': start,
                  'end': end,
                  'hold': int(m_hold.group(1)),
                  'sl': int(m_sl.group(1)),
                  'tp': int(m_tp.group(1)) if m_tp else 0,
                  'tr': int(m_tr.group(1)) if m_tr else 0,
                  'win': extract(content, '胜率'),
                  'avg': extract(content, '平均收益'),
                  'sharpe': extract(content, '夏普比'),
                  'mdd': extract(content, '最大回撤'),
                  'trades': extract(content, '成交样本'),
                  'calmar': extract(content, '卡玛比'),
                  'cash_initial': extract_exact(content, '初始现金'),
              }
              style_rows = parse_style_rows(content) or [{
                  '风格ID': 'slot_equal_4',
                  '风格': '等额四仓',
                  '最终现金': extract_text(content, '最终现金'),
                  '总收益': extract_text(content, '总收益'),
                  '现金回撤': extract_text(content, '现金最大回撤'),
                  '成交': extract_text(content, '成交笔数'),
                  '胜率': extract_text(content, '胜率'),
              }]
              for style_row in style_rows:
                  cell = dict(base_cell)
                  style = style_row.get('风格ID') or 'slot_equal_4'
                  cell.update({
                      'style': style,
                      'style_label': style_label(style, style_row.get('风格', '')),
                      'cash_final': parse_num(style_row.get('最终现金')),
                      'cash_return': parse_num(style_row.get('总收益')),
                      'cash_mdd': parse_num(style_row.get('现金回撤')),
                      'cash_trades': parse_num(style_row.get('成交')),
                      'cash_win': parse_num(style_row.get('胜率')),
                  })
                  cells.append(cell)

          def fmt(v, spec):
              return format(v, spec) if v is not None else '-'

          def sharp_flag(v):
              if v is None:
                  return '⚪'
              if v >= 0.6:
                  return '🟢'
              if v >= 0.2:
                  return '🟡'
              if v >= 0:
                  return '🟠'
              return '🔴'

          def risk_comment(c):
              if not c:
                  return '无有效样本'
              cash_ret = c.get('cash_return')
              s = c.get('sharpe')
              avg = c.get('avg')
              mdd = c.get('cash_mdd') if c.get('cash_mdd') is not None else c.get('mdd')
              notes = []
              if cash_ret is not None and cash_ret < 0:
                  notes.append('现金账户亏损')
              elif cash_ret is not None and cash_ret < 5:
                  notes.append('现金收益偏弱')
              elif cash_ret is not None:
                  notes.append('现金收益为正')
              elif s is not None and s < 0:
                  notes.append('风险收益比偏弱')
              elif s is not None and s < 0.2:
                  notes.append('边际优势较薄')
              else:
                  notes.append('风险收益尚可')
              if avg is not None and avg < 0:
                  notes.append('单笔期望为负')
              if mdd is not None and mdd <= -15:
                  notes.append('回撤较大')
              return '；'.join(notes[:2]) if notes else '指标平衡'

          def rank_value(c):
              return c.get('cash_return') if c.get('cash_return') is not None else c.get('sharpe')

          def robust_key(c):
              return (c.get('style', ''), c.get('hold'), c.get('sl'), c.get('tp'), c.get('tr'))

          def robust_representative(group):
              recent = [c for c in group if c.get('period') == 'recent_6m']
              return max(recent or group, key=rank_value)

          def robust_scores(cells_for_rank):
              groups = {}
              for c in cells_for_rank:
                  groups.setdefault(robust_key(c), []).append(c)
              out = []
              for group in groups.values():
                  by_period = {}
                  for c in group:
                      p = c.get('period') or '-'
                      if p not in by_period or rank_value(c) > rank_value(by_period[p]):
                          by_period[p] = c
                  values = [rank_value(c) for c in by_period.values() if rank_value(c) is not None]
                  if not values:
                      continue
                  recent = rank_value(by_period['recent_6m']) if 'recent_6m' in by_period else 0.0
                  positive = sum(1 for v in values if v > 0)
                  score = min(values) + sum(values) / len(values) * 0.35 + recent * 0.2 + positive * 4.0
                  out.append({'cell': robust_representative(group), 'score': score, 'values': values, 'positive': positive})
              return sorted(out, key=lambda x: x['score'], reverse=True)

          def card_payload(title, template, card_elements):
              return {
                  'msg_type': 'interactive',
                  'card': {
                      'header': {'title': {'tag': 'plain_text', 'content': title}, 'template': template},
                      'elements': card_elements,
                  },
              }

          def payload_size(payload):
              return len(json.dumps(payload, ensure_ascii=False).encode('utf-8'))

          def post_card(title, template, card_elements):
              payload = card_payload(title, template, card_elements)
              size = payload_size(payload)
              resp = requests.post(webhook, json=payload, timeout=15)
              body = resp.text[:500]
              ok = 200 <= resp.status_code < 300
              try:
                  body_json = resp.json()
                  ok = ok and int(body_json.get('code', 0)) == 0
              except Exception:
                  pass
              print(f'飞书通知[{title}]: status={resp.status_code}, bytes={size}, ok={ok}, body={body}')
              return ok

          def ranking_line(idx, c, best, periods):
              is_best = c.get('period') == best.get('period') and c.get('style') == best.get('style') and c['hold'] == best['hold'] and c['sl'] == best['sl'] and c['tp'] == best.get('tp') and c['tr'] == best.get('tr')
              mark = '🏆 ' if is_best else ''
              tp_s = f'TP{c["tp"]}%' if c['tp'] else '无TP'
              tr_s = f'Trail-{c["tr"]}%' if c['tr'] else '无Trail'
              combo = f'{style_label(c.get("style", ""), c.get("style_label", ""))} / {c["hold"]}天 / SL-{c["sl"]}% / {tp_s} / {tr_s}'
              if len(periods) > 1:
                  combo = f'{period_label(c.get("period", ""))} · {combo}'
              return (
                  f'{idx}. {mark}{combo} | 现金 {fmt(c.get("cash_return"), "+.2f")}% | '
                  f'终值 {fmt(c.get("cash_final"), ",.0f")} | 夏普 {fmt(c.get("sharpe"), ".3f")} | '
                  f'现金回撤 {fmt(c.get("cash_mdd") if c.get("cash_mdd") is not None else c.get("mdd"), ".1f")}% | '
                  f'样本 {int(c.get("trades") or 0)}笔'
              )

          def split_ranking_cards(ranked, best, periods, template, max_bytes=85000):
              cards = []
              current = []
              for idx, c in enumerate(ranked, 1):
                  line = ranking_line(idx, c, best, periods)
                  candidate = current + [line]
                  candidate_elements = [{'tag': 'div', 'text': {'tag': 'lark_md', 'content': '\n'.join(candidate)}}]
                  if current and payload_size(card_payload('📊 Backtest Grid 参数梯队', template, candidate_elements)) > max_bytes:
                      cards.append(current)
                      current = [line]
                  else:
                      current = candidate
              if current:
                  cards.append(current)
              total = len(cards)
              out = []
              for batch_idx, lines in enumerate(cards, 1):
                  out.append(
                      [
                          {
                              'tag': 'div',
                              'text': {
                                  'tag': 'lark_md',
                                  'content': f'**参数梯队表（按现金收益排序） {batch_idx}/{total}**\n' + '\n'.join(lines),
                              },
                          }
                      ]
                  )
              return out

          elements = []
          ranking_cards = []
          run_url = os.environ.get('RUN_URL', '')
          bt_start = os.environ.get('BT_START', '?')
          bt_end = os.environ.get('BT_END', '?')
          bt_topn = os.environ.get('BT_TOP_N', '?')
          periods = sorted(set(c.get('period', '') for c in cells if c.get('period')), key=period_sort_key)
          styles = sorted(set(c.get('style', '') for c in cells if c.get('style')), key=style_sort_key)
          param_shapes = sorted(set((c.get('hold'), c.get('sl'), c.get('tp'), c.get('tr')) for c in cells))
          param_count = len(param_shapes) if param_shapes else 0
          style_count = len(styles) or 1
          if cells and len(periods) > 1:
              period_text = ' / '.join(period_label(p) for p in periods)
              ranges = []
              for period in periods:
                  subset = [c for c in cells if c.get('period') == period]
                  starts = sorted(c.get('start') for c in subset if c.get('start'))
                  ends = sorted(c.get('end') for c in subset if c.get('end'))
                  ranges.append(f'{period_label(period)} {starts[0] if starts else "?"} ~ {ends[-1] if ends else "?"}')
              range_text = '；'.join(ranges)
              style_text = ' / '.join(style_label(s) for s in styles) if styles else '-'
              unit_text = f'共 {len(cells)} 风格单元（{len(periods)}周期 × {param_count}参数 × {style_count}风格）'
          elif cells:
              first = cells[0]
              period_text = period_label(first.get('period', os.environ.get('BT_PERIOD_LABEL', '?')))
              range_text = f'{first.get("start") or bt_start} ~ {first.get("end") or bt_end}'
              style_text = ' / '.join(style_label(s) for s in styles) if styles else '-'
              unit_text = f'共 {len(cells)} 风格单元（{param_count}参数 × {style_count}风格）'
          else:
              period_text = os.environ.get('BT_PERIOD_LABEL', '?')
              range_text = f'{bt_start} ~ {bt_end}'
              style_text = '-'
              unit_text = '共 0 单元'

          elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
              'content': f'**周期** {period_text}  ·  **风格** {style_text}  ·  **区间** {range_text}  ·  **TopN** {bt_topn}  ·  **{unit_text}**\n[查看详情]({run_url})'}})

          best = None
          if not cells:
              elements.append({'tag': 'div', 'text': {'tag': 'lark_md', 'content': '⚠️ 未找到回测结果文件'}})
          else:
              valid = [c for c in cells if rank_value(c) is not None]
              if not valid:
                  elements.append({'tag': 'hr'})
                  elements.append({'tag': 'div', 'text': {'tag': 'lark_md', 'content': '⚠️ 结果文件存在，但未解析到有效现金收益或夏普指标'}})
              else:
                  robust_ranked = robust_scores(valid) if len(periods) > 1 else []
                  best = robust_ranked[0]['cell'] if robust_ranked else max(valid, key=rank_value)
                  ranked = sorted(valid, key=rank_value, reverse=True)
                  pos_cnt = sum(1 for c in valid if (rank_value(c) or 0) > 0)
                  neg_cnt = sum(1 for c in valid if (rank_value(c) or 0) <= 0)

                  elements.append({'tag': 'hr'})
                  br = rank_value(best) or 0
                  tag = '🏆' if br > 0 else '📌'
                  best_period = f'（{period_label(best.get("period", ""))}）' if len(periods) > 1 else ''
                  tp_str = f'TP{best["tp"]}%' if best['tp'] else '无止盈'
                  tr_str = f'移动止盈-{best["tr"]}%' if best['tr'] else '无移动止盈'
                  best_label = '稳健参数（跨周期惩罚）' if robust_ranked else '最优参数（按现金收益）'
                  elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                      'content': f'{tag} **{best_label}{best_period}**: {style_label(best.get("style", ""), best.get("style_label", ""))} / 持有{best["hold"]}天 / SL-{best["sl"]}% / {tp_str} / {tr_str}'}})

                  cols = [
                      ('**现金收益**', f'{fmt(best.get("cash_return"), "+.2f")}%'),
                      ('**最终现金**', f'{fmt(best.get("cash_final"), ",.2f")}'),
                      ('**现金成交**', f'{int(best.get("cash_trades") or 0)}笔'),
                      ('**夏普**', f'{sharp_flag(best.get("sharpe"))} {fmt(best.get("sharpe"), ".3f")}'),
                      ('**现金回撤**', f'{fmt(best.get("cash_mdd") if best.get("cash_mdd") is not None else best.get("mdd"), ".1f")}%'),
                      ('**样本**', f'{int(best.get("trades") or 0)}笔'),
                  ]
                  elements.append({'tag': 'column_set', 'flex_mode': 'stretch',
                      'background_style': 'grey', 'columns': [
                          {'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                              {'tag': 'div', 'text': {'tag': 'lark_md', 'content': f'{label}\n{val}'}}
                          ]} for label, val in cols
                      ]})

                  elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                      'content': f'**策略体检**: {risk_comment(best)}  ·  正现金收益组合 {pos_cnt} / 非正现金收益组合 {neg_cnt}'}})
                  elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                      'content': f'**逐笔辅助指标**: 夏普 {sharp_flag(best.get("sharpe"))} {fmt(best.get("sharpe"), ".3f")}，胜率 {fmt(best.get("win"), ".1f")}%，均收 {fmt(best.get("avg"), "+.2f")}%'}})
                  if robust_ranked:
                      rb = robust_ranked[0]
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                          'content': f'**跨周期稳健性**: 正收益周期 {rb["positive"]}/{len(rb["values"])}，最差周期 {fmt(min(rb["values"]), "+.2f")}%，稳健分 {fmt(rb["score"], ".2f")}'}})

                  if len(periods) > 1:
                      elements.append({'tag': 'hr'})
                      lines = ['**各周期最优（按现金收益）**']
                      for period in periods:
                          subset = [c for c in valid if c.get('period') == period and rank_value(c) is not None]
                          if not subset:
                              continue
                          b = max(subset, key=rank_value)
                          tp_s = f'TP{b["tp"]}%' if b['tp'] else '无TP'
                          tr_s = f'Trail-{b["tr"]}%' if b['tr'] else '无Trail'
                          lines.append(
                              f'- {period_label(period)}: {style_label(b.get("style", ""), b.get("style_label", ""))} / {b["hold"]}天 / SL-{b["sl"]}% / {tp_s} / {tr_s}，'
                              f'现金收益 {fmt(b.get("cash_return"), "+.2f")}%，夏普 {fmt(b.get("sharpe"), ".3f")}'
                          )
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md', 'content': '\n'.join(lines)}})

                  if len(styles) > 1:
                      elements.append({'tag': 'hr'})
                      lines = ['**各交易风格最优（按现金收益）**']
                      for style in styles:
                          subset = [c for c in valid if c.get('style') == style and rank_value(c) is not None]
                          if not subset:
                              continue
                          b = max(subset, key=rank_value)
                          tp_s = f'TP{b["tp"]}%' if b['tp'] else '无TP'
                          tr_s = f'Trail-{b["tr"]}%' if b['tr'] else '无Trail'
                          lines.append(
                              f'- {style_label(style, b.get("style_label", ""))}: {period_label(b.get("period", ""))} / {b["hold"]}天 / SL-{b["sl"]}% / {tp_s} / {tr_s}，'
                              f'现金收益 {fmt(b.get("cash_return"), "+.2f")}%'
                          )
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md', 'content': '\n'.join(lines)}})

                  # 参数梯队完整排名拆成后续轻量卡片，避免飞书 100KB 单卡上限。
                  elements.append({'tag': 'hr'})
                  ranking_cards = split_ranking_cards(ranked, best, periods, 'blue' if (rank_value(best) or 0) > 0 else 'orange')
                  elements.append({'tag': 'div', 'text': {'tag': 'lark_md', 'content': f'**参数梯队表**: 共 {len(ranked)} 组，已拆分为 {len(ranking_cards)} 张后续卡片发送，避免飞书单卡 100KB 上限。'}})

                  # 夏普矩阵（每格取 TP/Trail 最优）
                  holds = sorted(set(c['hold'] for c in cells))
                  sls = sorted(set(c['sl'] for c in cells))
                  agg = {}
                  for c in cells:
                      key = (c['hold'], c['sl'])
                      if c.get('sharpe') is not None:
                          if key not in agg or c['sharpe'] > agg[key]['sharpe']:
                              agg[key] = c

                  if len(holds) > 1 and len(sls) > 1:
                      elements.append({'tag': 'hr'})
                      elements.append({'tag': 'div', 'text': {'tag': 'lark_md',
                          'content': '**最优夏普矩阵** (每格取 TP/Trail 最优)'}})
                      # Header row
                      hdr_cols = [{'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                          {'tag': 'div', 'text': {'tag': 'lark_md', 'content': '**持有\\\\SL**'}}]}]
                      for s in sls:
                          hdr_cols.append({'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                              {'tag': 'div', 'text': {'tag': 'lark_md', 'content': f'**-{s}%**'}}]})
                      elements.append({'tag': 'column_set', 'flex_mode': 'stretch',
                          'background_style': 'grey', 'columns': hdr_cols})
                      # Data rows
                      for h in holds:
                          row_cols = [{'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                              {'tag': 'div', 'text': {'tag': 'lark_md', 'content': f'**{h}天**'}}]}]
                          for s in sls:
                              c = agg.get((h, s))
                              v = fmt(c.get('sharpe') if c else None, '.3f')
                              is_b = c and c.get('period') == best.get('period') and c.get('style') == best.get('style') and c.get('hold') == best.get('hold') and c.get('sl') == best.get('sl') and c.get('tp') == best.get('tp') and c.get('tr') == best.get('tr')
                              cell_text = f'**{v}** 🏆' if is_b and v != '-' else v
                              row_cols.append({'tag': 'column', 'width': 'weighted', 'weight': 1, 'elements': [
                                  {'tag': 'div', 'text': {'tag': 'lark_md', 'content': cell_text}}]})
                          elements.append({'tag': 'column_set', 'flex_mode': 'stretch', 'columns': row_cols})

          template = 'blue' if (best and (rank_value(best) or 0) > 0) else 'orange' if cells else 'red'
          ok = post_card('📊 Backtest Grid 回测完成', template, elements)
          for idx, card_elements in enumerate(ranking_cards, 1):
              ok = post_card(f'📊 Backtest Grid 参数梯队 {idx}/{len(ranking_cards)}', 'blue', card_elements) and ok
          if not ok:
              raise SystemExit(1)
          PYEOF

