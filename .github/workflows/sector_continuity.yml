name: Sector Continuity Report

on:
  schedule:
    # UTC 08:10 Mon-Fri = 北京时间周一至周五 16:10，A 股收盘后刷新概念热度历史
    - cron: "10 8 * * 1-5"
  workflow_dispatch:

concurrency:
  group: sector-continuity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      WYCKOFF_WRITE_CONTEXT: "server_job"
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run sector continuity report
        run: python scripts/sector_continuity_report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sector-continuity-report
          path: logs/sector_continuity_report.md
