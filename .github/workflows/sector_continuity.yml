name: Sector Continuity Report

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run sector continuity report
        run: python scripts/sector_continuity_report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sector-continuity-report
          path: logs/sector_continuity_report.md
