name: Wyckoff Funnel

on:
  schedule:
    # 北京时间周日到周四 17:17（UTC 9:17），为下一交易日做盘后准备。
    - cron: '17 9 * * 0-4'
  workflow_dispatch:
    inputs:
      end_calendar_day:
        description: "可选：回放目标自然日，例如 2026-05-26"
        required: false
        type: string

concurrency:
  group: daily-job-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      WYCKOFF_WRITE_CONTEXT: "server_job"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      # TickFlow 日K批量上限为 120/min、200标的/次；主漏斗优先走批量接口。
      TICKFLOW_KLINE_RATE_LIMIT_PER_MIN: "110"
      FUNNEL_EXECUTOR_MODE: "thread"
      FUNNEL_MAX_WORKERS: "4"
      FUNNEL_BATCH_SIZE: "200"
      FUNNEL_BATCH_SLEEP: "0.55"
      END_CALENDAR_DAY: ${{ github.event.inputs.end_calendar_day || '' }}
      DEFAULT_LLM_PROVIDER: ${{ secrets.DEFAULT_LLM_PROVIDER }}
      STEP3_LLM_PROVIDER: ${{ vars.STEP3_LLM_PROVIDER || secrets.STEP3_LLM_PROVIDER || 'gemini' }}
      STEP3_LLM_FALLBACK_PROVIDERS: ${{ vars.STEP3_LLM_FALLBACK_PROVIDERS || secrets.STEP3_LLM_FALLBACK_PROVIDERS || 'efficiency' }}
      STEP4_LLM_PROVIDER: ${{ vars.STEP4_LLM_PROVIDER || secrets.STEP4_LLM_PROVIDER || 'efficiency' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      1ROUTE_API_KEY: ${{ secrets.ONEROUTE_API_KEY }}
      1ROUTE_MODEL: ${{ secrets.ONEROUTE_MODEL }}
      1ROUTE_BASE_URL: ${{ secrets.ONEROUTE_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
      QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      ZHIPU_MODEL: ${{ secrets.ZHIPU_MODEL }}
      ZHIPU_BASE_URL: ${{ secrets.ZHIPU_BASE_URL }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
      MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
      VOLCENGINE_API_KEY: ${{ secrets.VOLCENGINE_API_KEY }}
      VOLCENGINE_MODEL: ${{ secrets.VOLCENGINE_MODEL }}
      VOLCENGINE_BASE_URL: ${{ secrets.VOLCENGINE_BASE_URL }}
      EFFICIENCY_API_KEY: ${{ secrets.EFFICIENCY_API_KEY }}
      EFFICIENCY_MODEL: ${{ secrets.EFFICIENCY_MODEL }}
      EFFICIENCY_BASE_URL: ${{ secrets.EFFICIENCY_BASE_URL }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      MY_PORTFOLIO_STATE: ${{ secrets.MY_PORTFOLIO_STATE }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      RAG_SEMANTIC_VETO_ENABLED: ${{ vars.RAG_SEMANTIC_VETO_ENABLED || '1' }}
      RAG_SEMANTIC_PROVIDER: ${{ vars.RAG_SEMANTIC_PROVIDER || secrets.RAG_SEMANTIC_PROVIDER || 'efficiency' }}
      # 实盘风控参数：锁死 -8% 止损 + 单票仓位上限
      STEP4_BUY_HARD_STOP_ENABLED: "1"
      STEP4_BUY_HARD_STOP_PCT: "8.0"
      STEP4_BUY_STOP_MODE: "floor"
      STEP4_PROBE_BUDGET_LIMIT: "0.10"
      STEP4_ATTACK_BUDGET_LIMIT: "0.25"
      STEP4_BUY_BLOCK_REGIMES: "CRASH,BLACK_SWAN,RISK_OFF"
      STEP4_REQUIRE_CONFIRMED_BUY_CANDIDATE: "1"
      # AI 候选选择：按可交易 L4 收口，避免裸 SOS/EVR 噪声直接进入执行链路。
      FUNNEL_AI_SELECTION_MODE: ${{ vars.FUNNEL_AI_SELECTION_MODE || 'tradeable_l4' }}
      FUNNEL_AI_TOTAL_CAP: "8"
      # off=静态配额；shadow=旁路记录动态策略差异；on=正式启用动态配额。
      FUNNEL_DYNAMIC_POLICY: ${{ vars.FUNNEL_DYNAMIC_POLICY || secrets.FUNNEL_DYNAMIC_POLICY || 'shadow' }}
      FUNNEL_DYNAMIC_POLICY_HORIZON: "5"
      FUNNEL_DEFENSIVE_FORCE_QUOTA: "1"
      FUNNEL_AI_RISK_ON_TREND: "3"
      FUNNEL_AI_RISK_ON_ACCUM: "5"
      FUNNEL_AI_RISK_OFF_TREND: "0"
      FUNNEL_AI_RISK_OFF_ACCUM: "0"
      FUNNEL_AI_NEUTRAL_TREND: "2"
      FUNNEL_AI_NEUTRAL_ACCUM: "3"
      FUNNEL_AI_BEAR_REBOUND_TREND: "1"
      FUNNEL_AI_BEAR_REBOUND_ACCUM: "2"
      FUNNEL_L2_BYPASS_AI_ENABLED: "0"
      FUNNEL_STRATEGIC_L2_BYPASS_AI_CAP: "2"
      FUNNEL_THEME_RADAR_PROMOTE_CAP: "2"
      DAILY_JOB_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Prepare artifact dirs
        run: mkdir -p logs artifacts

      - name: Run daily job
        run: |
          set -o pipefail
          python -u scripts/daily_job.py --logs ${{ github.workspace }}/logs/daily_job.log \
            2>&1 | tee -a ${{ github.workspace }}/logs/daily_job.console.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-job-artifacts-${{ github.run_number }}
          path: |
            logs/*.log
            artifacts/**
          retention-days: 30
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          REF: ${{ github.ref_name }}
        run: |
          python -c "
          import os, urllib.request, json
          url = os.environ.get('FEISHU_WEBHOOK_URL', '')
          if not url:
            print('FEISHU_WEBHOOK_URL 未配置，跳过失败通知')
            exit(0)
          content = '**Run**: ' + os.environ.get('RUN_URL', '') + '\n**Workflow**: ' + os.environ.get('WORKFLOW', '') + '\n**Branch**: ' + os.environ.get('REF', '')
          payload = {
            'msg_type': 'interactive',
            'card': {
              'header': {'title': {'tag': 'plain_text', 'content': '❌ 定时任务失败'}},
              'elements': [{'tag': 'div', 'text': {'tag': 'lark_md', 'content': content}}]
            }
          }
          req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={'Content-Type': 'application/json'})
          try:
            urllib.request.urlopen(req, timeout=10)
          except Exception as e:
            print('warning: 失败通知发送异常:', e)
          "
