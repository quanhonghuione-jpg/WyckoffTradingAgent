name: Tail Buy

on:
  schedule:
    # 北京时间 周一-周五 14:45（UTC 06:45），A 股收盘前尾盘扫描
    - cron: "45 6 * * 1-5"
  workflow_dispatch:

concurrency:
  group: tail-buy-1350-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      EFFICIENCY_API_KEY: ${{ secrets.EFFICIENCY_API_KEY }}
      EFFICIENCY_MODEL: ${{ secrets.EFFICIENCY_MODEL }}
      EFFICIENCY_BASE_URL: ${{ secrets.EFFICIENCY_BASE_URL }}
      TAIL_BUY_LLM_PROVIDER: ${{ vars.TAIL_BUY_LLM_PROVIDER || secrets.TAIL_BUY_LLM_PROVIDER || 'efficiency' }}
      TAIL_BUY_LLM_FALLBACK_PROVIDERS: ${{ vars.TAIL_BUY_LLM_FALLBACK_PROVIDERS || secrets.TAIL_BUY_LLM_FALLBACK_PROVIDERS || '' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
      TAIL_BUY_LLM_TOP_N: "12"
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TAIL_BUY_FETCH_CONCURRENCY: "8"
      TAIL_BUY_LLM_CONCURRENCY: "1"
      TAIL_BUY_LLM_MIN_RULE_SCORE: "70"
      TAIL_BUY_LOG_LLM_PER_SYMBOL_ERRORS: "0"
      LLM_LOG_USAGE: "0"
      LLM_LOG_RETRY_ERRORS: "0"
      TAIL_BUY_TASK_TIMEOUT_MIN: "25"
      TAIL_BUY_INTRADAY_LIMIT_PER_MIN: "30"
      TAIL_BUY_MAX_OVER_LIMIT_SYMBOLS: "5"
      TAIL_BUY_FORCE_OVER_LIMIT: "1"
      TAIL_BUY_TICKFLOW_MAX_RETRIES: "1"
      TAIL_BUY_USE_BATCH_INTRADAY: "1"
      TAIL_BUY_INTRADAY_BATCH_SIZE: "200"
      TAIL_BUY_PORTFOLIO_ID: ${{ secrets.TAIL_BUY_PORTFOLIO_ID }}
      TAIL_BUY_HOLDING_HARD_STOP_PCT: "6"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Prepare logs dir
        run: mkdir -p logs

      - name: Run tail buy job
        run: |
          set -o pipefail
          python -u scripts/tail_buy_intraday_job.py \
            --max-llm-symbols "${TAIL_BUY_LLM_TOP_N}" \
            --deadline-minute "${TAIL_BUY_TASK_TIMEOUT_MIN}" \
            --logs "${{ github.workspace }}/logs/tail_buy_1350.log" \
            2>&1 | tee -a "${{ github.workspace }}/logs/tail_buy_1350.console.log"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tail-buy-1350-logs-${{ github.run_number }}
          path: logs/*
          retention-days: 7
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          REF: ${{ github.ref_name }}
        run: |
          python -c "
          import os, urllib.request, json
          url = os.environ.get('FEISHU_WEBHOOK_URL', '')
          if not url:
            print('FEISHU_WEBHOOK_URL 未配置，跳过失败通知')
            exit(0)
          content = '**Run**: ' + os.environ.get('RUN_URL', '') + '\n**Workflow**: ' + os.environ.get('WORKFLOW', '') + '\n**Branch**: ' + os.environ.get('REF', '')
          payload = {
            'msg_type': 'interactive',
            'card': {
              'header': {'title': {'tag': 'plain_text', 'content': '❌ Tail Buy 任务失败'}},
              'elements': [{'tag': 'div', 'text': {'tag': 'lark_md', 'content': content}}]
            }
          }
          req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={'Content-Type': 'application/json'})
          try:
            urllib.request.urlopen(req, timeout=10)
          except Exception as e:
            print('warning: 失败通知发送异常:', e)
          "
