name: Backtest Grid US

on:
  workflow_dispatch:
    inputs:
      top_n:
        description: "每日选股 TopN"
        required: true
        default: "2"
      trading_days:
        description: "回看交易日数"
        required: true
        default: "320"

concurrency:
  group: backtest-grid-us-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  BT_TOP_N: ${{ inputs.top_n || '2' }}
  BT_TRADING_DAYS: ${{ inputs.trading_days || '320' }}

jobs:
  fetch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        period:
          - key: bear_2022
            label: "熊市(2022加息周期)"
            start: "2022-01-03"
            end: "2022-10-12"
          - key: bull_2023
            label: "牛市(2023-24 AI驱动)"
            start: "2023-01-03"
            end: "2024-07-31"
    env:
      PYTHONUNBUFFERED: "1"
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      TZ: America/New_York
      BT_START: ${{ matrix.period.start }}
      BT_END: ${{ matrix.period.end }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch US data snapshot
        shell: bash
        run: |
          set -euo pipefail
          python -u scripts/backtest_snapshot_fetch_us.py \
            --start "$BT_START" \
            --end "$BT_END" \
            --trading-days "$BT_TRADING_DAYS" \
            --output-dir snapshot_data

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: backtest-us-snapshot-${{ matrix.period.key }}
          path: snapshot_data/*
          retention-days: 3

  grid:
    runs-on: ubuntu-latest
    needs: fetch
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        period:
          - key: bear_2022
            label: "熊市(2022加息周期)"
            start: "2022-01-03"
            end: "2022-10-12"
          - key: bull_2023
            label: "牛市(2023-24 AI驱动)"
            start: "2023-01-03"
            end: "2024-07-31"
    env:
      PYTHONUNBUFFERED: "1"
      TZ: America/New_York
      PERIOD_KEY: ${{ matrix.period.key }}
      PERIOD_LABEL: ${{ matrix.period.label }}
      BT_START: ${{ matrix.period.start }}
      BT_END: ${{ matrix.period.end }}
      OUT_DIR: analysis/backtest_grid_us/${{ matrix.period.key }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[wbt]"

      - name: Download snapshot
        uses: actions/download-artifact@v4
        with:
          name: backtest-us-snapshot-${{ matrix.period.key }}
          path: snapshot_data/

      - name: Run six strategy replays
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"

          python -u scripts/us_backtest_strategy_replay.py \
            --snapshot-dir snapshot_data \
            --output-dir "$OUT_DIR" \
            --period-key "$PERIOD_KEY" \
            --period-label "$PERIOD_LABEL" \
            --start "$BT_START" \
            --end "$BT_END" \
            --top-n "$BT_TOP_N" \
            | tee "$OUT_DIR/replay.log"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-us-grid-${{ matrix.period.key }}-${{ github.run_number }}
          path: ${{ env.OUT_DIR }}/*
          retention-days: 7
          if-no-files-found: warn

  notify:
    runs-on: ubuntu-latest
    needs: grid
    if: always()
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: backtest-us-grid-*

      - name: Install dependencies
        run: pip install requests

      - name: Aggregate and notify
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python -u scripts/notify_us_backtest.py \
            --artifacts-dir artifacts \
            --output docs/BACKTEST_US_REPORT.md \
            --run-url "$RUN_URL" \
            --top-n "$BT_TOP_N"

      - name: Upload market backtest report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-us-report-${{ github.run_number }}
          path: docs/BACKTEST_US_REPORT.md
          retention-days: 30
          if-no-files-found: error

      - name: Commit US backtest report
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/BACKTEST_US_REPORT.md
          if git diff --cached --quiet; then
            echo "US backtest report unchanged"
          else
            git commit -m "docs: update US backtest report"
            git push
          fi

      - name: Notify on failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PYEOF'
          import json
          import os
          import urllib.request

          url = os.environ.get("FEISHU_WEBHOOK_URL", "")
          if not url:
              print("FEISHU_WEBHOOK_URL 未配置，跳过失败通知")
              raise SystemExit(0)
          content = "**US Backtest Grid 美股回测失败**\n**Run**: " + os.environ.get("RUN_URL", "")
          payload = {
              "msg_type": "interactive",
              "card": {
                  "header": {"title": {"tag": "plain_text", "content": "❌ US Backtest Grid 失败"}, "template": "red"},
                  "elements": [{"tag": "div", "text": {"tag": "lark_md", "content": content}}],
              },
          }
          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"})
          try:
              urllib.request.urlopen(req, timeout=15)
          except Exception as exc:
              print(f"通知失败: {exc}")
          PYEOF
